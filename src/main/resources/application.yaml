server:
  port: ${PORT:8080}

config:
  private-key: chave-super-secreta-2

keycloak:
  enabled: true
  realm: caixinha-auth-server
  host: https://lemur-5.cloud-iam.com/auth
  client-id: ${KC_CLIENT_ID}
  client-secret: ${KC_CLIENT_SECRET}

bot-builder:
  read-timeout: 30000
  base-url: https://bot-builder-engine-2242d70bd3b3.herokuapp.com

email-api:
  base-url: ${EMAIL_API_URL:https://email-api-placeholder.com}

pix-api:
  base-url: ${PIX_API_URL:https://caixinha-financeira-9a2031b303cc.herokuapp.com}
  read-timeout: 35000
  api-key: ${PIX_API_KEY:}
  client-id: ${PIX_CLIENT_ID:}
  chave-pix: ${PIX_CHAVE_PIX:cbe55be4-97a9-4590-a861-766c5a2233ee}
  provider: asaas

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

rate-limit:
  max-requests: 10
  window-seconds: 60

logging:
  level:
      springframework:
        security: INFO
        web:
          client: INFO

mongodb:
  principal:
    uri: ${MONGO_URL:mongodb://localhost:27017/flow}
  admin:
    uri: ${MONGO_URL:mongodb://localhost:27017/flow}

spring:
  data:
    mongodb:
      uri: ${mongodb.principal.uri}

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${keycloak.client-id}
            client-secret: ${keycloak.client-secret}
            scope: openid, profile, email
        provider:
          keycloak:
            issuer-uri: ${keycloak.host}/realms/${keycloak.realm}
      resourceserver:
        jwt:
          jwk-set-uri: ${keycloak.host}/realms/${keycloak.realm}/protocol/openid-connect/certs
          issuer-uri: ${keycloak.host}/realms/${keycloak.realm}
